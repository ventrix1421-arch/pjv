<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patrick John M. Veniegas | Full Stack Developer</title>
    <meta name="description"
        content="Patrick John M. Veniegas — Full Stack Developer. 60+ web systems, 30+ mobile apps. HTML, CSS, JavaScript, Flutter, PHP, Laravel, C#. UEP BSIT. OJT at Schools Division Office of Pangasinan II." />
    <meta name="keywords" content="Full Stack Developer, Flutter, React Native, PHP, Laravel, HTML, CSS, JavaScript, Tailwind CSS, Philippines, Pangasinan, UEP" />
    <meta name="author" content="Patrick John M. Veniegas" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(217 33% 17%)",
                        background: "hsl(222 47% 5%)",
                        foreground: "hsl(210 40% 98%)",
                        primary: { DEFAULT: "hsl(217 91% 60%)", foreground: "hsl(222 47% 5%)" },
                        muted: { DEFAULT: "hsl(217 33% 17%)", foreground: "hsl(215 20% 65%)" },
                        card: { DEFAULT: "hsl(222 47% 7%)", foreground: "hsl(210 40% 98%)" },
                    },
                    fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>

<body class="bg-background text-foreground antialiased">

    <div id="loader" class="loader-screen">
        <div class="loader-spinner"></div>
    </div>

    <header id="header" class="site-header">
        <div class="container header-inner">
            <a href="#home" class="logo">PJV<span class="text-primary">.</span></a>
            <nav class="desktop-nav" aria-label="Main navigation">
                <a href="#about">About</a>
                <a href="#skills">Skills</a>
                <a href="#stack">Stack</a>
                <a href="#terminal">Terminal</a>
                <a href="#projects">Projects</a>
                <a href="#experience">Experience</a>
                <a href="#education">Education</a>
                <a href="#contact">Contact</a>
            </nav>
            <div class="header-actions">
                <button id="cmd-hint-btn" class="cmd-hint-btn hidden md:inline-flex" title="Command Palette (Ctrl+K)">
                    <kbd>⌘K</kbd>
                </button>
                <button id="download-resume-btn" class="btn btn-primary btn-sm hidden sm:inline-flex">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download Resume

                <button id="menu-btn" class="menu-btn lg:hidden" aria-label="Toggle menu" aria-expanded="false">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
        <nav id="mobileMenu" class="mobile-nav" aria-label="Mobile navigation">
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#stack">Stack</a>
            <a href="#terminal">Terminal</a>
            <a href="#projects">Projects</a>
            <a href="#experience">Experience</a>
            <a href="#education">Education</a>
            <a href="#contact">Contact</a>
            <button id="download-resume-mobile" class="btn btn-primary w-full mt-2">Download Resume</button>
        </nav>
    </header>

    <main>
        <section id="home" class="hero-section">
            <div class="container hero-grid">
                <div class="hero-content">
                    <div class="badge" id="availability-badge">Open to Work</div>
                    <h1 class="hero-title">
                        Hi, I'm <span class="text-primary" id="hero-name">Patrick John M. Veniegas</span>
                    </h1>
                    <p class="hero-tagline" id="hero-tagline"></p>
                    <p class="hero-subtitle" id="hero-subtitle"></p>
                    <div class="hero-actions">
                        <button id="hero-download-btn" class="btn btn-primary">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Download Resume
                        </button>
                        <a href="#projects" class="btn btn-outline">View Projects</a>
                        <a href="#contact" class="btn btn-outline">Contact Me</a>
                    </div>
                    <div id="statsContainer" class="stats-grid"></div>
                </div>
                <div class="hero-image-wrap">
                    <div class="hero-image-card">
                        <img id="hero-image" src="" alt="Patrick John M. Veniegas" />
                    </div>
                </div>
            </div>
        </section>

        <section id="about" class="section"><div class="container" id="aboutContainer"></div></section>
        <section id="achievements" class="section section-muted"><div class="container" id="achievementsContainer"></div></section>
        <section id="skills" class="section"><div class="container" id="skillsContainer"></div></section>
        <section id="stack" class="section section-muted"><div class="container" id="stackContainer"></div></section>
        <section id="terminal" class="section"><div class="container" id="terminalContainer"></div></section>
        <section id="projects" class="section section-muted"><div class="container" id="projectsContainer"></div></section>
        <section id="experience" class="section"><div class="container" id="experienceContainer"></div></section>
        <section id="education" class="section section-muted"><div class="container" id="educationContainer"></div></section>
        <section id="cta" class="section"><div class="container" id="ctaContainer"></div></section>
        <section id="contact" class="section section-muted"><div class="container" id="contactContainer"></div></section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; <span id="footer-year"></span> <span id="footer-name">Patrick John M. Veniegas</span>. Built with HTML, CSS & JavaScript.</p>
            <div id="socialLinks" class="social-links"></div>
        </div>
    </footer>

    <div id="resume-document" class="resume-hidden" aria-hidden="true"></div>

    <!-- Command Palette -->
    <div id="command-palette" class="command-palette" aria-hidden="true">
        <div class="command-backdrop"></div>
        <div class="command-dialog" role="dialog" aria-label="Command palette">
            <div class="command-input-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="command-input" type="text" placeholder="Type a command or search..." autocomplete="off" spellcheck="false">
                <kbd class="command-esc">ESC</kbd>
            </div>
            <ul id="command-list" class="command-list"></ul>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
